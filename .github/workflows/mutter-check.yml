# Validates Mutter task/plan hygiene, skill cross-references, and Claude→Cursor skill parity.
name: mutter-check
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mutter-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: CI bundle (refs, tasks, sync, parity diff, governance)
        run: python3 scripts/mutter.py ci --check-cursor-sync --with-governance
